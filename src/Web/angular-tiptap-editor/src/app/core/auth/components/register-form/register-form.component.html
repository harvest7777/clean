<div class="flex flex-col gap-3 w-72">
  <p class="opacity-60 text-sm">create account</p>

  @if (errorMessage()) {
    <p class="opacity-60 text-sm">{{ errorMessage() }}</p>
  }

  @if (isSuccess()) {
    <p class="opacity-60 text-sm">account created! <a [routerLink]="routes.authLogin">sign in</a></p>
  } @else {
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-3">
      <app-input formControlName="email" placeholder="email" />
      <app-input formControlName="password" type="password" placeholder="password" />
      <button appButton type="submit" [disabled]="isLoading() || form.invalid" [isLoading]="isLoading()">
        create account
      </button>
    </form>

    <p class="opacity-60 text-sm">have an account? <a [routerLink]="routes.authLogin">sign in</a></p>
  }
</div>
