<div class="auth-container">
  <h1>You're already signed in</h1>
  <p>You do not need to sign in or create another account.</p>

  @if (errorMessage()) {
    <p class="error">{{ errorMessage() }}</p>
  }

  <p><a [routerLink]="routes.editor">Go to editor</a></p>
  <p><a [routerLink]="routes.home">Go home</a></p>
  <p>
    <button type="button" [disabled]="isLoggingOut()" (click)="onLogout()">
      {{ isLoggingOut() ? 'Signing out…' : 'Log out' }}
    </button>
  </p>
</div>
